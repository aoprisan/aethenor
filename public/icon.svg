<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Athanor">
  <rect width="512" height="512" rx="96" fill="#0a0a0c"/>
  <!-- Squaring the circle: alchemical glyph for the philosopher's stone -->
  <g fill="none" stroke="#c9a24b" stroke-width="10">
    <circle cx="256" cy="256" r="168"/>
    <rect x="150" y="150" width="212" height="212"/>
    <circle cx="256" cy="256" r="118"/>
    <polygon points="256,150 362,362 150,362"/>
  </g>
</svg>
