<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Athanor">
  <defs>
    <!-- Gold-leaf gilding: lit from the crown, tarnished at the base. -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d089"/>
      <stop offset="0.5" stop-color="#d4a94e"/>
      <stop offset="1" stop-color="#7e6230"/>
    </linearGradient>
    <!-- The furnace ember glowing behind the figure. -->
    <radialGradient id="ember" cx="0.5" cy="0.52" r="0.55">
      <stop offset="0" stop-color="#d4a94e" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#9a6f2e" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stone" cx="0.4" cy="0.36" r="0.7">
      <stop offset="0" stop-color="#f6dca0"/>
      <stop offset="0.55" stop-color="#d4a94e"/>
      <stop offset="1" stop-color="#8a6a32"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="104" fill="#0c0a09"/>
  <rect width="512" height="512" rx="104" fill="url(#ember)"/>

  <!-- Squaring the circle: the alchemical figure of the philosopher's stone. -->
  <g fill="none" stroke="url(#gold)" stroke-width="9" stroke-linejoin="round">
    <circle cx="256" cy="256" r="170"/>
    <rect x="148" y="148" width="216" height="216" rx="2"/>
    <polygon points="256,146 364,366 148,366"/>
    <circle cx="256" cy="256" r="116"/>
  </g>

  <!-- The stone itself, at the centre. -->
  <circle cx="256" cy="256" r="15" fill="url(#stone)"/>
  <circle cx="256" cy="256" r="26" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.7"/>
</svg>
